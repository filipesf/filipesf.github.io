<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salvage RPG — Decisões de Design</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --ink: #1a1a18;
    --paper: #f5f0e8;
    --dust: #d9d0c0;
    --rust: #a0522d;
    --rust-light: #c4845c;
    --ash: #6b6560;
    --glow: #c9a826;
    --glow-dim: rgba(201,168,38,0.15);
    --radiation: #7a8c2a;
    --danger: #8b2500;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    color: var(--ink);
    background: var(--paper);
    line-height: 1.5;
    min-height: 100dvh;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    overflow-x: hidden;
  }

  /* ── PROGRESS BAR ── */

  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: var(--dust);
    z-index: 100;
  }

  .progress-bar__fill {
    height: 100%;
    background: var(--glow);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── HEADER BAR ── */

  .header-bar {
    position: fixed;
    top: 4px;
    left: 0;
    width: 100%;
    background: var(--paper);
    border-bottom: 1.5px solid var(--ink);
    z-index: 90;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-bar__section {
    font-family: 'Space Mono', monospace;
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--rust);
  }

  .header-bar__count {
    font-family: 'Space Mono', monospace;
    font-size: 0.6875rem;
    color: var(--ash);
    letter-spacing: 0.5px;
  }

  /* ── MAIN CONTAINER ── */

  .wizard {
    padding: 72px 16px 100px;
    max-width: 640px;
    margin: 0 auto;
  }

  /* ── WELCOME SCREEN ── */

  .screen {
    display: none;
  }

  .screen--active {
    display: block;
  }

  .welcome {
    text-align: center;
    padding-top: 20vh;
  }

  .welcome__title {
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .welcome__subtitle {
    font-size: 0.875rem;
    color: var(--ash);
    margin-bottom: 32px;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }

  .welcome__field {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 24px;
  }

  .welcome__label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ash);
  }

  .welcome__input {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.125rem;
    font-weight: 600;
    text-align: center;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--ink);
    padding: 8px 4px;
    color: var(--ink);
    width: 100%;
    max-width: 280px;
    outline: none;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .welcome__input:focus {
    border-bottom-color: var(--glow);
  }

  .welcome__input::placeholder {
    color: var(--dust);
  }

  /* ── BUTTONS ── */

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.8125rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    padding: 14px 28px;
    cursor: pointer;
    border-radius: 2px;
    min-height: 48px;
    transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn:active {
    background: var(--ash);
  }

  .btn--ghost {
    background: transparent;
    color: var(--ink);
  }

  .btn--ghost:active {
    background: var(--dust);
  }

  .btn--rust {
    background: var(--rust);
    border-color: var(--rust);
    color: var(--paper);
  }

  .btn--rust:active {
    background: var(--rust-light);
    border-color: var(--rust-light);
  }

  .btn--small {
    font-size: 0.6875rem;
    padding: 8px 16px;
    min-height: 36px;
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn:disabled:active {
    background: var(--ink);
  }

  .btn--ghost:disabled:active {
    background: transparent;
  }

  /* ── SECTION INTERSTITIAL ── */

  .interstitial {
    display: none;
    text-align: center;
    padding-top: 30vh;
    animation: interstitialIn 0.3s ease;
  }

  .interstitial--active {
    display: block;
  }

  @keyframes interstitialIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .interstitial__line {
    width: 48px;
    height: 2px;
    background: var(--rust);
    margin: 0 auto 16px;
  }

  .interstitial__step {
    font-family: 'Space Mono', monospace;
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--ash);
    margin-bottom: 8px;
  }

  .interstitial__title {
    font-family: 'Space Mono', monospace;
    font-size: 1.375rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.3px;
  }

  .interstitial__line--bottom {
    width: 48px;
    height: 2px;
    background: var(--rust);
    margin: 16px auto 0;
  }

  /* ── QUESTION CARD ── */

  .question {
    animation: questionIn 0.25s ease;
  }

  @keyframes questionIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .question__header {
    margin-bottom: 20px;
  }

  .question__number {
    font-family: 'Space Mono', monospace;
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--rust);
    margin-bottom: 6px;
  }

  .question__text {
    font-size: 1.125rem;
    font-weight: 600;
    line-height: 1.4;
  }

  .question__note {
    font-size: 0.8125rem;
    color: var(--ash);
    margin-top: 6px;
    font-style: italic;
  }

  /* ── OPTIONS ── */

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border: 2px solid var(--dust);
    padding: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 48px;
  }

  .option:active {
    background: var(--glow-dim);
  }

  .option--selected {
    border-color: var(--glow);
    background: var(--glow-dim);
  }

  .option__letter {
    width: 32px;
    height: 32px;
    border: 2px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.875rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .option--selected .option__letter {
    background: var(--glow);
    border-color: var(--glow);
    color: var(--paper);
  }

  .option__content {
    flex: 1;
    min-width: 0;
    padding-top: 2px;
  }

  .option__title {
    font-weight: 700;
    font-size: 0.9375rem;
    line-height: 1.35;
  }

  .option__desc {
    font-size: 0.8125rem;
    color: var(--ash);
    line-height: 1.35;
    margin-top: 2px;
  }

  /* ── RANKING OPTIONS (Step 2, Q2) ── */

  .option--ranking {
    position: relative;
  }

  .option--ranking .option__rank {
    width: 32px;
    height: 32px;
    border: 2px solid var(--dust);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.875rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    color: var(--dust);
  }

  .option--ranking.option--ranked .option__rank {
    background: var(--glow);
    border-color: var(--glow);
    color: var(--paper);
  }

  /* ── BOTTOM NAV ── */

  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: var(--paper);
    border-top: 1.5px solid var(--ink);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    z-index: 90;
  }

  .bottom-nav .btn {
    flex: 1;
  }

  /* ── RESULT SCREEN ── */

  .result-screen {
    background: var(--ink);
    color: var(--paper);
    min-height: 100dvh;
    padding: 16px 16px 100px;
  }

  .result-screen .progress-bar,
  .result-screen .header-bar {
    display: none;
  }

  .result__header {
    text-align: center;
    padding: 24px 0 20px;
    border-bottom: 2px solid var(--ash);
    margin-bottom: 24px;
  }

  .result__title {
    font-family: 'Space Mono', monospace;
    font-size: 1.25rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .result__name {
    font-size: 0.875rem;
    color: var(--ash);
  }

  .result-section {
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid #333;
  }

  .result-section:last-of-type {
    border-bottom: none;
  }

  .result-section__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .result-section__title {
    font-family: 'Space Mono', monospace;
    font-size: 0.8125rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--glow);
  }

  .result-section__copy {
    font-family: 'Space Mono', monospace;
    font-size: 0.625rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--rust);
    color: var(--paper);
    border: none;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 2px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 32px;
  }

  .result-section__copy:active {
    background: var(--rust-light);
  }

  .result-section__copy--done {
    background: var(--radiation);
  }

  .result-answers {
    font-family: 'Space Mono', monospace;
    font-size: 0.8125rem;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--dust);
  }

  .result-answers strong {
    color: var(--paper);
    font-weight: 700;
  }

  .result__actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 24px 0;
  }

  .result__actions .btn {
    width: 100%;
    text-align: center;
  }

  .btn--result-copy {
    background: var(--rust);
    border-color: var(--rust);
    color: var(--paper);
  }

  .btn--result-copy:active {
    background: var(--rust-light);
    border-color: var(--rust-light);
  }

  .btn--result-copy--done {
    background: var(--radiation);
    border-color: var(--radiation);
  }

  .btn--restart {
    background: transparent;
    border-color: var(--ash);
    color: var(--ash);
  }

  .btn--restart:active {
    background: #333;
  }

  /* ── FOCUS STYLES ── */

  .option:focus-visible {
    outline: 2px solid var(--glow);
    outline-offset: 2px;
  }

  /* ── HIDDEN STATES ── */

  .hidden {
    display: none !important;
  }

  /* ── DESKTOP ── */

  @media (min-width: 480px) {
    .wizard {
      padding-top: 80px;
      padding-bottom: 110px;
    }

    .option:hover {
      border-color: var(--rust-light);
    }

    .option--selected:hover {
      border-color: var(--glow);
    }

    .btn:hover:not(:disabled) {
      opacity: 0.85;
    }

    .result-section__copy:hover {
      background: var(--rust-light);
    }
  }

  @media (min-width: 768px) {
    .welcome {
      padding-top: 25vh;
    }

    .welcome__title {
      font-size: 2rem;
    }

    .question__text {
      font-size: 1.25rem;
    }
  }

  /* ── PRINT ── */

  @media print {
    .progress-bar,
    .header-bar,
    .bottom-nav,
    .result__actions { display: none !important; }

    .result-screen {
      padding: 10mm;
    }

    .result-section__copy { display: none; }
  }
</style>
</head>
<body>

<!-- PROGRESS BAR -->
<div class="progress-bar" id="progressBar">
  <div class="progress-bar__fill" id="progressFill"></div>
</div>

<!-- HEADER BAR -->
<div class="header-bar hidden" id="headerBar">
  <span class="header-bar__section" id="headerSection"></span>
  <span class="header-bar__count" id="headerCount"></span>
</div>

<!-- MAIN CONTAINER -->
<div class="wizard" id="wizard">

  <!-- WELCOME -->
  <div class="screen screen--active" id="screenWelcome">
    <div class="welcome">
      <div class="welcome__title">Salvage RPG</div>
      <div class="welcome__subtitle">Decisões de Design</div>
      <p style="font-size:0.875rem;color:var(--ash);margin-bottom:32px;max-width:320px;margin-left:auto;margin-right:auto;">Responda cada bloco. Suas respostas ficam salvas automaticamente.</p>
      <div class="welcome__field">
        <label class="welcome__label" for="nameInput">Seu nome</label>
        <input class="welcome__input" id="nameInput" type="text" placeholder="Digite seu nome" autocomplete="name" required>
      </div>
      <button class="btn" id="btnStart" disabled>Começar</button>
    </div>
  </div>

  <!-- INTERSTITIAL -->
  <div class="interstitial" id="screenInterstitial">
    <div class="interstitial__line"></div>
    <div class="interstitial__step" id="interstitialStep"></div>
    <div class="interstitial__title" id="interstitialTitle"></div>
    <div class="interstitial__line--bottom"></div>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="screenQuestion">
    <div class="question" id="questionCard">
      <div class="question__header">
        <div class="question__number" id="qNumber"></div>
        <div class="question__text" id="qText"></div>
        <div class="question__note hidden" id="qNote"></div>
      </div>
      <div class="options" id="qOptions"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screenResult"></div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav hidden" id="bottomNav">
  <button class="btn btn--ghost" id="btnPrev">Anterior</button>
  <button class="btn" id="btnNext" disabled>Próximo</button>
</div>

  // ─── RESULT LABELS ──────────────────────────────────

  var RESULT_TITLES = {
    world: 'MUNDO E TOM',
    threats: 'AMEAÇAS E ESCALA',
    magic: 'MAGIA E PODERES',
    progression: 'PROGRESSÃO E EVOLUÇÃO',
    crafting: 'CRAFTING E ECONOMIA'
  };

  // ─── FLATTEN QUESTIONS ──────────────────────────────

  // Build a flat list of all questions with step/block metadata
  var allQuestions = [];
  STEPS.forEach(function(step, si) {
    step.blocks.forEach(function(block, bi) {
      block.questions.forEach(function(q, qi) {
        allQuestions.push({
          stepIndex: si,
          blockIndex: bi,
          blockName: block.name,
          stepId: step.id,
          stepTitle: step.title,
          stepLabel: step.stepLabel,
          questionInStep: null, // computed below
          totalInStep: null,
          data: q
        });
      });
    });
  });

  // ─── STATE ──────────────────────────────────────────

  var playerName = '';
  var currentIndex = 0; // index into the visible (active) question list
  var showingInterstitial = false;

  // ─── DOM REFS ───────────────────────────────────────

  var $progressFill = document.getElementById('progressFill');
  var $headerBar = document.getElementById('headerBar');
  var $headerSection = document.getElementById('headerSection');
  var $headerCount = document.getElementById('headerCount');
  var $wizard = document.getElementById('wizard');

  var $screenWelcome = document.getElementById('screenWelcome');
  var $screenInterstitial = document.getElementById('screenInterstitial');
  var $interstitialStep = document.getElementById('interstitialStep');
  var $interstitialTitle = document.getElementById('interstitialTitle');
  var $screenQuestion = document.getElementById('screenQuestion');
  var $screenResult = document.getElementById('screenResult');

  var $questionCard = document.getElementById('questionCard');
  var $qNumber = document.getElementById('qNumber');
  var $qText = document.getElementById('qText');
  var $qNote = document.getElementById('qNote');
  var $qOptions = document.getElementById('qOptions');

  var $bottomNav = document.getElementById('bottomNav');
  var $btnPrev = document.getElementById('btnPrev');
  var $btnNext = document.getElementById('btnNext');

  var $nameInput = document.getElementById('nameInput');
  var $btnStart = document.getElementById('btnStart');

  // ─── STORAGE ────────────────────────────────────────

  function saveAnswer(qId, value) {
    try { localStorage.setItem('salvage_wizard_' + qId, value); } catch(e) {}
  }

  function loadAnswer(qId) {
    try { return localStorage.getItem('salvage_wizard_' + qId) || ''; } catch(e) { return ''; }
  }

  function saveName(name) {
    try { localStorage.setItem('salvage_wizard_name', name); } catch(e) {}
  }

  function loadName() {
    try { return localStorage.getItem('salvage_wizard_name') || ''; } catch(e) { return ''; }
  }

  function clearAll() {
    try {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf('salvage_wizard_') === 0) keys.push(k);
      }
      keys.forEach(function(k) { localStorage.removeItem(k); });
    } catch(e) {}
  }

  // ─── ACTIVE QUESTIONS (respecting conditionals) ─────

  function getActiveQuestions() {
    var active = [];
    for (var i = 0; i < allQuestions.length; i++) {
      var q = allQuestions[i];
      if (q.data.conditionalOn && q.data.hiddenIf) {
        var parentAnswer = loadAnswer(q.data.conditionalOn);
        if (parentAnswer === q.data.hiddenIf) continue;
      }
      active.push(q);
    }
    // Compute per-step numbers
    var stepCounts = {};
    active.forEach(function(q) {
      if (!stepCounts[q.stepId]) stepCounts[q.stepId] = { count: 0, total: 0 };
      stepCounts[q.stepId].total++;
    });
    var stepProgress = {};
    active.forEach(function(q) {
      if (!stepProgress[q.stepId]) stepProgress[q.stepId] = 0;
      stepProgress[q.stepId]++;
      q.questionInStep = stepProgress[q.stepId];
      q.totalInStep = stepCounts[q.stepId].total;
    });
    return active;
  }

  function getTotalAnswered() {
    var active = getActiveQuestions();
    var count = 0;
    active.forEach(function(q) {
      var a = loadAnswer(q.data.id);
      if (a) count++;
    });
    return { answered: count, total: active.length };
  }

  // ─── PROGRESS ───────────────────────────────────────

  function updateProgress() {
    var info = getTotalAnswered();
    var pct = info.total > 0 ? (info.answered / info.total * 100) : 0;
    $progressFill.style.width = pct + '%';
  }

  // ─── RENDER QUESTION ───────────────────────────────

  function renderQuestion(index) {
    var active = getActiveQuestions();
    if (index < 0 || index >= active.length) return;

    var q = active[index];
    currentIndex = index;
    showingInterstitial = false;

    // Header
    $headerBar.classList.remove('hidden');
    $headerSection.textContent = q.stepTitle;
    $headerCount.textContent = q.questionInStep + ' de ' + q.totalInStep;

    // Question number
    var qNum = q.data.id.split('_');
    $qNumber.textContent = 'Pergunta ' + qNum[1];
    $qText.textContent = q.data.text;

    // Note
    if (q.data.note) {
      $qNote.textContent = q.data.note;
      $qNote.classList.remove('hidden');
    } else {
      $qNote.classList.add('hidden');
    }

    // Options
    $qOptions.innerHTML = '';
    var currentAnswer = loadAnswer(q.data.id);

    if (q.data.type === 'ranking') {
      renderRankingOptions(q, currentAnswer);
    } else {
      renderStandardOptions(q, currentAnswer);
    }

    // Screens
    $screenWelcome.classList.remove('screen--active');
    $screenInterstitial.classList.remove('interstitial--active');
    $screenQuestion.classList.add('screen--active');
    $screenResult.classList.remove('screen--active');

    // Bottom nav
    $bottomNav.classList.remove('hidden');
    $btnPrev.disabled = (index === 0);
    updateNextButton();
    updateProgress();

    // Re-trigger animation
    $questionCard.style.animation = 'none';
    void $questionCard.offsetHeight;
    $questionCard.style.animation = '';

    // Scroll to top
    window.scrollTo(0, 0);
  }

  function renderStandardOptions(q, currentAnswer) {
    q.data.options.forEach(function(opt) {
      var div = document.createElement('div');
      div.className = 'option' + (currentAnswer === opt.letter ? ' option--selected' : '');
      div.setAttribute('role', 'button');
      div.setAttribute('tabindex', '0');

      var letterDiv = document.createElement('div');
      letterDiv.className = 'option__letter';
      letterDiv.textContent = opt.letter;

      var contentDiv = document.createElement('div');
      contentDiv.className = 'option__content';

      var titleDiv = document.createElement('div');
      titleDiv.className = 'option__title';
      titleDiv.textContent = opt.title;
      contentDiv.appendChild(titleDiv);

      if (opt.desc) {
        var descDiv = document.createElement('div');
        descDiv.className = 'option__desc';
        descDiv.textContent = opt.desc;
        contentDiv.appendChild(descDiv);
      }

      div.appendChild(letterDiv);
      div.appendChild(contentDiv);

      div.addEventListener('click', function() {
        selectStandardOption(q.data.id, opt.letter);
      });

      div.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectStandardOption(q.data.id, opt.letter);
        }
      });

      $qOptions.appendChild(div);
    });
  }

  function selectStandardOption(qId, letter) {
    saveAnswer(qId, letter);

    // Check if this triggers a skip (re-evaluate active questions)
    var q = allQuestions.find(function(aq) { return aq.data.id === qId; });
    if (q && q.data.skipIf && letter === q.data.skipIf) {
      // Clear answers for skipped questions
      allQuestions.forEach(function(aq) {
        if (aq.data.conditionalOn === qId && aq.data.hiddenIf === letter) {
          saveAnswer(aq.data.id, '');
        }
      });
    }

    // Re-render to update selection visual
    renderQuestion(currentIndex);
  }

  function renderRankingOptions(q, currentAnswer) {
    var ranked = currentAnswer ? currentAnswer.split(',').filter(Boolean) : [];

    q.data.options.forEach(function(opt) {
      var rankIndex = ranked.indexOf(opt.letter);
      var isRanked = rankIndex !== -1;

      var div = document.createElement('div');
      div.className = 'option option--ranking' + (isRanked ? ' option--ranked' : '');
      div.setAttribute('role', 'button');
      div.setAttribute('tabindex', '0');

      var rankDiv = document.createElement('div');
      rankDiv.className = 'option__rank';
      rankDiv.textContent = isRanked ? String(rankIndex + 1) : opt.letter;
      if (isRanked) {
        rankDiv.style.background = 'var(--glow)';
        rankDiv.style.borderColor = 'var(--glow)';
        rankDiv.style.color = 'var(--paper)';
      } else {
        rankDiv.style.border = '2px solid var(--ink)';
        rankDiv.style.background = 'transparent';
        rankDiv.style.color = 'var(--ink)';
      }

      var contentDiv = document.createElement('div');
      contentDiv.className = 'option__content';

      var titleDiv = document.createElement('div');
      titleDiv.className = 'option__title';
      titleDiv.textContent = opt.title;
      contentDiv.appendChild(titleDiv);

      if (opt.desc) {
        var descDiv = document.createElement('div');
        descDiv.className = 'option__desc';
        descDiv.textContent = opt.desc;
        contentDiv.appendChild(descDiv);
      }

      div.appendChild(rankDiv);
      div.appendChild(contentDiv);

      div.addEventListener('click', function() {
        selectRankingOption(q.data.id, opt.letter, q);
      });

      div.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectRankingOption(q.data.id, opt.letter, q);
        }
      });

      $qOptions.appendChild(div);
    });
  }

  function selectRankingOption(qId, letter, q) {
    var currentAnswer = loadAnswer(qId);
    var ranked = currentAnswer ? currentAnswer.split(',').filter(Boolean) : [];

    var idx = ranked.indexOf(letter);
    if (idx !== -1) {
      // Deselect: remove and shift
      ranked.splice(idx, 1);
    } else {
      // Add at end
      ranked.push(letter);
    }

    saveAnswer(qId, ranked.join(','));
    renderQuestion(currentIndex);
  }

  // ─── NEXT BUTTON STATE ──────────────────────────────

  function updateNextButton() {
    var active = getActiveQuestions();
    if (currentIndex >= active.length) return;
    var q = active[currentIndex];
    var answer = loadAnswer(q.data.id);

    if (q.data.type === 'ranking') {
      var ranked = answer ? answer.split(',').filter(Boolean) : [];
      $btnNext.disabled = ranked.length < 3;
    } else {
      $btnNext.disabled = !answer;
    }

    // Change label for last question
    if (currentIndex === active.length - 1) {
      $btnNext.textContent = 'Ver resultado';
    } else {
      $btnNext.textContent = 'Próximo';
    }
  }

  // ─── INTERSTITIAL ───────────────────────────────────

  function showInterstitial(stepIndex, callback) {
    var step = STEPS[stepIndex];
    $interstitialStep.textContent = step.stepLabel;
    $interstitialTitle.textContent = step.title;

    $screenWelcome.classList.remove('screen--active');
    $screenQuestion.classList.remove('screen--active');
    $screenResult.classList.remove('screen--active');
    $screenInterstitial.classList.add('interstitial--active');
    $bottomNav.classList.add('hidden');

    showingInterstitial = true;

    setTimeout(function() {
      if (showingInterstitial) {
        showingInterstitial = false;
        callback();
      }
    }, 1200);
  }

  // ─── NAVIGATION ─────────────────────────────────────

  function goNext() {
    var active = getActiveQuestions();
    var nextIndex = currentIndex + 1;

    if (nextIndex >= active.length) {
      showResult();
      return;
    }

    // Check if entering a new step
    var currentStep = active[currentIndex].stepIndex;
    var nextStep = active[nextIndex].stepIndex;

    if (nextStep !== currentStep) {
      showInterstitial(nextStep, function() {
        renderQuestion(nextIndex);
      });
    } else {
      renderQuestion(nextIndex);
    }
  }

  function goPrev() {
    if (currentIndex > 0) {
      renderQuestion(currentIndex - 1);
    }
  }

  // ─── RESULT ─────────────────────────────────────────

  function showResult() {
    $screenWelcome.classList.remove('screen--active');
    $screenQuestion.classList.remove('screen--active');
    $screenInterstitial.classList.remove('interstitial--active');
    $screenResult.classList.add('screen--active');
    $headerBar.classList.add('hidden');
    $bottomNav.classList.add('hidden');
    $progressFill.style.width = '100%';

    document.body.style.background = 'var(--ink)';
    $wizard.style.padding = '0';
    $wizard.style.maxWidth = 'none';

    var html = '<div class="result-screen">';
    html += '<div class="result__header">';
    html += '<div class="result__title">Salvage RPG — Resultado</div>';
    html += '<div class="result__name">' + escHtml(playerName) + '</div>';
    html += '</div>';

    var allText = '[' + playerName.toUpperCase() + ']\n\n';

    STEPS.forEach(function(step) {
      var sectionTitle = RESULT_TITLES[step.id];
      var sectionText = '\u2014 ' + sectionTitle + '\n';
      var hasAnswers = false;

      var stepQuestions = allQuestions.filter(function(q) { return q.stepId === step.id; });
      var activeQs = getActiveQuestions();
      var activeIds = {};
      activeQs.forEach(function(q) { activeIds[q.data.id] = true; });

      stepQuestions.forEach(function(q) {
        if (!activeIds[q.data.id]) return;
        var answer = loadAnswer(q.data.id);
        if (!answer) return;
        hasAnswers = true;

        var qNum = q.data.id.split('_')[1];

        if (q.data.type === 'ranking') {
          var ranked = answer.split(',').filter(Boolean);
          var rankStr = ranked.map(function(l, i) {
            var opt = q.data.options.find(function(o) { return o.letter === l; });
            return l + (opt ? ' (' + opt.title + ')' : '');
          }).join(' > ');
          sectionText += qNum + ': ' + rankStr + '\n';
        } else {
          var opt = q.data.options.find(function(o) { return o.letter === answer; });
          var title = opt ? opt.title : '';
          sectionText += qNum + answer + '. ' + title + '\n';
        }
      });

      if (!hasAnswers) return;

      allText += sectionText + '\n';

      html += '<div class="result-section">';
      html += '<div class="result-section__header">';
      html += '<span class="result-section__title">' + escHtml(sectionTitle) + '</span>';
      html += '<button class="result-section__copy" data-section="' + step.id + '">Copiar</button>';
      html += '</div>';
      html += '<div class="result-answers">';

      stepQuestions.forEach(function(q) {
        if (!activeIds[q.data.id]) return;
        var answer = loadAnswer(q.data.id);
        if (!answer) return;
        var qNum = q.data.id.split('_')[1];

        if (q.data.type === 'ranking') {
          var ranked = answer.split(',').filter(Boolean);
          var rankStr = ranked.map(function(l) {
            var opt = q.data.options.find(function(o) { return o.letter === l; });
            return l + (opt ? ' (' + opt.title + ')' : '');
          }).join(' > ');
          html += '<strong>' + qNum + ':</strong> ' + escHtml(rankStr) + '\n';
        } else {
          var opt = q.data.options.find(function(o) { return o.letter === answer; });
          var title = opt ? opt.title : '';
          html += '<strong>' + qNum + answer + '.</strong> ' + escHtml(title) + '\n';
        }
      });

      html += '</div></div>';
    });

    html += '<div class="result__actions">';
    html += '<button class="btn btn--result-copy" id="btnCopyAll">Copiar tudo</button>';
    html += '<button class="btn btn--restart" id="btnRestart">Recomeçar</button>';
    html += '</div>';
    html += '</div>';

    $screenResult.innerHTML = html;

    // Copy all
    document.getElementById('btnCopyAll').addEventListener('click', function() {
      copyToClipboard(allText, this);
    });

    // Per-section copy
    var sectionBtns = $screenResult.querySelectorAll('.result-section__copy');
    sectionBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var stepId = this.getAttribute('data-section');
        var sectionEl = this.closest('.result-section');
        var answersEl = sectionEl.querySelector('.result-answers');
        var text = '[' + playerName.toUpperCase() + '] \u2014 ' + RESULT_TITLES[stepId] + '\n' + answersEl.textContent;
        copyToClipboard(text, this);
      });
    });

    // Restart
    document.getElementById('btnRestart').addEventListener('click', function() {
      if (confirm('Tem certeza? Todas as respostas serão apagadas.')) {
        clearAll();
        location.reload();
      }
    });

    window.scrollTo(0, 0);
  }

  function copyToClipboard(text, btn) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopyFeedback(btn);
      }).catch(function() {
        fallbackCopy(text, btn);
      });
    } else {
      fallbackCopy(text, btn);
    }
  }

  function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopyFeedback(btn); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showCopyFeedback(btn) {
    var orig = btn.textContent;
    btn.textContent = 'Copiado!';
    if (btn.classList.contains('btn--result-copy')) {
      btn.classList.add('btn--result-copy--done');
    } else {
      btn.classList.add('result-section__copy--done');
    }
    setTimeout(function() {
      btn.textContent = orig;
      btn.classList.remove('btn--result-copy--done');
      btn.classList.remove('result-section__copy--done');
    }, 1500);
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ─── INIT ───────────────────────────────────────────

  function init() {
    // Restore name
    var savedName = loadName();
    if (savedName) {
      $nameInput.value = savedName;
      $btnStart.disabled = false;
      playerName = savedName;
    }

    // Name input events
    $nameInput.addEventListener('input', function() {
      $btnStart.disabled = !this.value.trim();
    });

    $nameInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && this.value.trim()) {
        startWizard();
      }
    });

    $btnStart.addEventListener('click', function() {
      startWizard();
    });

    // Nav buttons
    $btnNext.addEventListener('click', goNext);
    $btnPrev.addEventListener('click', goPrev);

    // Check if we should resume
    if (savedName) {
      var active = getActiveQuestions();
      var firstUnanswered = -1;
      for (var i = 0; i < active.length; i++) {
        var a = loadAnswer(active[i].data.id);
        if (!a) { firstUnanswered = i; break; }
      }

      if (firstUnanswered === -1 && active.length > 0) {
        // All answered — go directly to result
        playerName = savedName;
        showResult();
        return;
      }

      if (firstUnanswered > 0) {
        // Resume from first unanswered — skip interstitial
        playerName = savedName;
        saveName(playerName);
        $screenWelcome.classList.remove('screen--active');
        renderQuestion(firstUnanswered);
        return;
      }
    }
  }

  function startWizard() {
    playerName = $nameInput.value.trim();
    if (!playerName) return;
    saveName(playerName);

    var active = getActiveQuestions();
    var firstUnanswered = 0;
    for (var i = 0; i < active.length; i++) {
      if (!loadAnswer(active[i].data.id)) {
        firstUnanswered = i;
        break;
      }
      if (i === active.length - 1) firstUnanswered = i;
    }

    // Show interstitial for the first step of the first unanswered question
    var targetStep = active[firstUnanswered].stepIndex;
    showInterstitial(targetStep, function() {
      renderQuestion(firstUnanswered);
    });
  }

  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    if (showingInterstitial) return;
    if ($screenQuestion.classList.contains('screen--active')) {
      if (e.key === 'ArrowRight' || e.key === 'Enter') {
        if (!$btnNext.disabled) goNext();
      } else if (e.key === 'ArrowLeft') {
        if (!$btnPrev.disabled) goPrev();
      }
    }
  });

  // Swipe support
  var touchStartX = 0;
  var touchStartY = 0;
  document.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!$screenQuestion.classList.contains('screen--active')) return;
    var dx = e.changedTouches[0].screenX - touchStartX;
    var dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx)) return;
    if (dx < 0 && !$btnNext.disabled) goNext();
    if (dx > 0 && !$btnPrev.disabled) goPrev();
  }, { passive: true });

  init();

})();
</script>

</body>
</html>
